services:
  db:
    image: postgres:16-alpine
    container_name: balandda-db
    environment:
      POSTGRES_DB: balandda
      POSTGRES_USER: balandda
      POSTGRES_PASSWORD: change_me_in_production
    ports:
      - "5432:5432"
    volumes:
      - ./docker/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balandda"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: balandda-bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m bot.main
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: balandda-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - default
      - webnet

networks:
  webnet:
    external: true
